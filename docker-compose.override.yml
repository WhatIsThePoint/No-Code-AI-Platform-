version: "3.9"

volumes:
  uploaded_files:
  model_artifacts:

# Local development overrides: hot-reload via volume mounts
services:
  api-gateway:
    volumes:
      - ./services/api-gateway:/app
      # Read-only mount so the runtime migration-drift endpoint can diff
      # init.sql against the live schema without leaving the container.
      - ./infra:/app/infra:ro
    environment:
      # Declare host GPU so /system/hardware reports accurately even though
      # the gateway container has no nvidia runtime mounted. Override per host.
      GPU_NAME: "${GPU_NAME:-NVIDIA GeForce GTX 1660 SUPER}"
      GPU_TOTAL_VRAM_MB: "${GPU_TOTAL_VRAM_MB:-6144}"
      GPU_FREE_VRAM_MB: "${GPU_FREE_VRAM_MB:-5500}"
    command: flask --app app.main run --host=0.0.0.0 --port=8000 --debug

  auth-service:
    volumes:
      - ./services/auth-service:/app
    command: flask --app app.main run --host=0.0.0.0 --port=8001 --debug

  data-ingestion-service:
    volumes:
      - ./services/data-ingestion-service:/app
      - uploaded_files:/uploads
    command: flask --app app.main run --host=0.0.0.0 --port=8002 --debug

  data-ingestion-worker:
    volumes:
      - ./services/data-ingestion-service:/app
      - uploaded_files:/uploads
    command: celery -A app.tasks.celery_app worker --loglevel=debug -Q ingestion,connectors,rag --concurrency=1 --include=app.tasks.profiling,app.tasks.preprocessing,app.tasks.sql_import,app.tasks.rag_ingest

  ml-training-service:
    image: ml-training-with-rag-deps:local
    volumes:
      - ./services/ml-training-service:/app
      - model_artifacts:/models
    command: flask --app app.main run --host=0.0.0.0 --port=8003 --debug

  ml-training-worker:
    volumes:
      - ./services/ml-training-service:/app
      - uploaded_files:/uploads
      - model_artifacts:/models
    command: celery -A app.tasks.celery_app worker --loglevel=debug -Q training --pool=solo --include=app.tasks.train

  metrics-service:
    volumes:
      - ./services/metrics-service:/app
    command: flask --app app.main run --host=0.0.0.0 --port=8004 --debug

  # Sprint 8 — dev hot-reload for dl-training-service. Same pattern as the
  # ml-training pair: mount the source over /app so a file edit triggers
  # Flask's reloader without a docker rebuild.
  dl-training-service:
    volumes:
      - ./services/dl-training-service:/app
      - uploaded_files:/uploads
      - model_artifacts:/models
    command: flask --app app.main run --host=0.0.0.0 --port=8005 --debug

  dl-training-worker:
    volumes:
      - ./services/dl-training-service:/app
      - uploaded_files:/uploads
      - model_artifacts:/models
    command: celery -A app.tasks.celery_app worker --loglevel=debug -Q dl_training --concurrency=1 --include=app.tasks.train_image

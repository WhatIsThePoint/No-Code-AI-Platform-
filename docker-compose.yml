version: "3.9"

x-common-env: &common-env
  env_file:
    - .env

x-python-service: &python-service
  restart: unless-stopped
  networks:
    - backend
  env_file:
    - .env

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  timescale_data:
  uploaded_files:
  model_artifacts:
  ollama_models:
  # Sprint 8 — isolated stores for the SQL-connector wizard demo. Kept on
  # their own volumes so a wipe of the production-shaped postgres_data
  # never touches the test fixtures, and vice versa.
  test_postgres_data:
  test_mysql_data:

services:
  # ── Databases ──────────────────────────────────────────────────────────────

  postgres:
    # pgvector/pgvector:pg16 is binary-compatible with postgres:16-alpine —
    # the existing postgres_data volume upgrades in place (same PG16 datadir).
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nocode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nocode_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nocode_auth}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocode} -d ${POSTGRES_DB:-nocode_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5434:5432"

  # ── Test fixtures for the SQL Connector Wizard ────────────────────────────
  # Two throwaway databases pre-seeded with a small retail-analytics dataset
  # so a reviewer can click through the wizard end-to-end against both
  # supported dialects. Network-internal hosts are `test-postgres` and
  # `test-mysql`; from outside the compose network they live on 5435 / 3307.
  # Credentials are intentionally trivial — these stores hold demo data only.
  test-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
      - ./infra/test-dbs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: shopdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d shopdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5435:5432"

  test-mysql:
    image: mysql:8.0
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - test_mysql_data:/var/lib/mysql
      - ./infra/test-dbs/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: shopdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpass"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3307:3306"

  mongo:
    image: mongo:7
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - mongo_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-nocode}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-nocode_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-nocode_ingestion}
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - timescale_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nocode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nocode_secret}
      POSTGRES_DB: nocode_metrics
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocode}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  # ── Application Services ───────────────────────────────────────────────────

  api-gateway:
    <<: *python-service
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      DATA_SERVICE_URL: http://data-ingestion-service:8002
      ML_SERVICE_URL: http://ml-training-service:8003
      METRICS_SERVICE_URL: http://metrics-service:8004
      DL_SERVICE_URL: http://dl-training-service:8005
      REDIS_URL: redis://redis:6379/0
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/2
      DATABASE_URL: postgresql://${POSTGRES_USER:-nocode}:${POSTGRES_PASSWORD:-nocode_secret}@postgres:5432/${POSTGRES_DB:-nocode_auth}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
      data-ingestion-service:
        condition: service_started

  auth-service:
    <<: *python-service
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-nocode}:${POSTGRES_PASSWORD:-nocode_secret}@postgres:5432/${POSTGRES_DB:-nocode_auth}
      REDIS_URL: redis://redis:6379/0
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_SOLO_MONTHLY: ${STRIPE_PRICE_SOLO_MONTHLY:-}
      STRIPE_PRICE_SOLO_YEARLY: ${STRIPE_PRICE_SOLO_YEARLY:-}
      STRIPE_PRICE_COMPANY_MONTHLY: ${STRIPE_PRICE_COMPANY_MONTHLY:-}
      STRIPE_PRICE_COMPANY_YEARLY: ${STRIPE_PRICE_COMPANY_YEARLY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/auth/google/callback}
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/2
      MAIL_SERVER: mailhog
      MAIL_PORT: "1025"
      MAIL_FROM: ${MAIL_FROM:-no-reply@nocode-ai.local}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  data-ingestion-service:
    <<: *python-service
    build:
      context: ./services/data-ingestion-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - uploaded_files:/uploads
    environment:
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nocode}:${MONGO_INITDB_ROOT_PASSWORD:-nocode_secret}@mongo:27017/${MONGO_DB:-nocode_ingestion}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      UPLOAD_FOLDER: /uploads
      IMAGE_DATASET_ROOT: /uploads/images
      MAX_IMAGE_UPLOAD_SIZE_MB: ${MAX_IMAGE_UPLOAD_SIZE_MB:-500}
      PGVECTOR_DSN: postgresql://${POSTGRES_USER:-nocode}:${POSTGRES_PASSWORD:-nocode_secret}@postgres:5432/${POSTGRES_DB:-nocode_auth}
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  data-ingestion-worker:
    <<: *python-service
    build:
      context: ./services/data-ingestion-service
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q ingestion,connectors,rag --concurrency=2
    volumes:
      - uploaded_files:/uploads
    environment:
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nocode}:${MONGO_INITDB_ROOT_PASSWORD:-nocode_secret}@mongo:27017/${MONGO_DB:-nocode_ingestion}?authSource=admin
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      UPLOAD_FOLDER: /uploads
      IMAGE_DATASET_ROOT: /uploads/images
      MAX_IMAGE_UPLOAD_SIZE_MB: ${MAX_IMAGE_UPLOAD_SIZE_MB:-500}
      PGVECTOR_DSN: postgresql://${POSTGRES_USER:-nocode}:${POSTGRES_PASSWORD:-nocode_secret}@postgres:5432/${POSTGRES_DB:-nocode_auth}
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ml-training-service:
    <<: *python-service
    build:
      context: ./services/ml-training-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    volumes:
      - uploaded_files:/uploads
      - model_artifacts:/models
    environment:
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nocode}:${MONGO_INITDB_ROOT_PASSWORD:-nocode_secret}@mongo:27017/${MONGO_DB:-nocode_ingestion}?authSource=admin
      MONGO_DB: ${MONGO_DB:-nocode_ingestion}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      UPLOAD_FOLDER: /uploads
      MODEL_FOLDER: /models
      MAIL_SERVER: mailhog
      MAIL_PORT: "1025"
      FRONTEND_URL: http://localhost:5173
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      PGVECTOR_DSN: postgresql://${POSTGRES_USER:-nocode}:${POSTGRES_PASSWORD:-nocode_secret}@postgres:5432/${POSTGRES_DB:-nocode_auth}
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ml-training-worker:
    <<: *python-service
    build:
      context: ./services/ml-training-service
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q training --concurrency=2
    volumes:
      - uploaded_files:/uploads
      - model_artifacts:/models
    environment:
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nocode}:${MONGO_INITDB_ROOT_PASSWORD:-nocode_secret}@mongo:27017/${MONGO_DB:-nocode_ingestion}?authSource=admin
      MONGO_DB: ${MONGO_DB:-nocode_ingestion}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/2
      UPLOAD_FOLDER: /uploads
      MODEL_FOLDER: /models
      MAIL_SERVER: mailhog
      MAIL_PORT: "1025"
      FRONTEND_URL: http://localhost:5173
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2:3b
      PGVECTOR_DSN: postgresql://${POSTGRES_USER:-nocode}:${POSTGRES_PASSWORD:-nocode_secret}@postgres:5432/${POSTGRES_DB:-nocode_auth}
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: unless-stopped
    # Zero out the chaos monkey: vanilla MailHog v1.0.1 ships with Jim's
    # sender-reject / recipient-reject percentages high enough to drop
    # transactional mail during a live demo. Bring every chance to 0 so
    # MailHog always accepts.
    command: >-
      MailHog -invite-jim=false
      -jim-disconnect=0 -jim-accept=1.0
      -jim-linkspeed-affect=0
      -jim-reject-sender=0
      -jim-reject-recipient=0
      -jim-reject-auth=0
    networks:
      - backend
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ── Local LLM (RAG / GenAI workspace) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # GPU acceleration — requires nvidia-container-toolkit on the host.
    # Uncomment to enable; falls back to CPU otherwise.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # One-shot: pulls llama3.2:3b on first boot via Ollama's HTTP API, then exits.
  # Re-running `docker compose up` is a no-op once the model is cached in ollama_models
  # (the /api/pull endpoint is idempotent — it short-circuits on existing layers).
  ollama-pull:
    image: curlimages/curl:8.10.1
    networks:
      - backend
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        echo "[ollama-pull] waiting for ollama service..."
        until curl -sf http://ollama:11434/api/tags >/dev/null; do sleep 2; done
        echo "[ollama-pull] pulling llama3.2:3b (~2GB Q4_K_M, fits 1660 Super 6GB VRAM)"
        curl -fsS -X POST http://ollama:11434/api/pull \
          -H 'Content-Type: application/json' \
          -d '{"name":"llama3.2:3b","stream":false}'
        echo ""
        echo "[ollama-pull] done"
    restart: "no"
    depends_on:
      ollama:
        condition: service_started

  metrics-service:
    <<: *python-service
    build:
      context: ./services/metrics-service
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      TIMESCALE_URL: postgresql://${POSTGRES_USER:-nocode}:${POSTGRES_PASSWORD:-nocode_secret}@timescaledb:5432/nocode_metrics
    depends_on:
      timescaledb:
        condition: service_healthy

  # ── Deep-learning service (image classification, PyTorch + CUDA) ──────────
  # Split out from ml-training-service because torch+torchvision is ~2 GB of
  # deps and only this service needs the GPU. Falls back to CPU automatically
  # when the nvidia runtime isn't wired up — slow but functional, so CI on a
  # GPU-less host still boots the stack.
  dl-training-service:
    <<: *python-service
    build:
      context: ./services/dl-training-service
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    volumes:
      - uploaded_files:/uploads
      - model_artifacts:/models
    environment:
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nocode}:${MONGO_INITDB_ROOT_PASSWORD:-nocode_secret}@mongo:27017/${MONGO_DB:-nocode_ingestion}?authSource=admin
      MONGO_DB: ${MONGO_DB:-nocode_ingestion}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/2
      UPLOAD_FOLDER: /uploads
      MODEL_FOLDER: /models
      IMAGE_DATASET_ROOT: /uploads/images
      DEFAULT_MAX_VRAM_MB: ${DL_DEFAULT_MAX_VRAM_MB:-5120}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # GPU reservation — requires nvidia-container-toolkit on the host.
    # Ollama (RAG LLM) intentionally has NO reservation block, so it stays
    # on CPU and never competes with the training task for the 6 GB of
    # VRAM on the GTX 1660 Super. The DL service owns the GPU exclusively.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  dl-training-worker:
    <<: *python-service
    build:
      context: ./services/dl-training-service
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q dl_training --concurrency=1
    volumes:
      - uploaded_files:/uploads
      - model_artifacts:/models
    environment:
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-nocode}:${MONGO_INITDB_ROOT_PASSWORD:-nocode_secret}@mongo:27017/${MONGO_DB:-nocode_ingestion}?authSource=admin
      MONGO_DB: ${MONGO_DB:-nocode_ingestion}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SOCKETIO_MESSAGE_QUEUE: redis://redis:6379/2
      UPLOAD_FOLDER: /uploads
      MODEL_FOLDER: /models
      IMAGE_DATASET_ROOT: /uploads/images
      DEFAULT_MAX_VRAM_MB: ${DL_DEFAULT_MAX_VRAM_MB:-5120}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # `--concurrency=1` is intentional — only one training task at a time
    # holds the GPU, and that's also the level at which OOM safety is
    # enforced. Bumping this up requires either multiple GPUs or per-task
    # memory limits, neither of which is in scope for the demo.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

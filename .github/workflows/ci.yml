name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend: lint + type check ──────────────────────────────────────────────
  lint-backend:
    name: Lint (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, data-ingestion-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install linters
        run: pip install black==24.4.2 isort==5.13.2 flake8==7.1.0

      - name: black
        run: black --check services/${{ matrix.service }}/

      - name: isort
        run: isort --check-only --profile black services/${{ matrix.service }}/

      - name: flake8
        run: flake8 services/${{ matrix.service }}/ --max-line-length 100 --extend-ignore E203,W503

  # ── Frontend: lint + type check ─────────────────────────────────────────────
  lint-frontend:
    name: Lint (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

      - name: TypeScript type-check
        run: cd frontend && npm run type-check

  # ── Backend: tests ───────────────────────────────────────────────────────────
  test-backend:
    name: Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, auth-service, data-ingestion-service]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_auth
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

      mongo:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test
        options: >-
          --health-cmd="mongosh --eval \"db.adminCommand('ping')\" --quiet"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-flask

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_auth
          MONGO_URL: mongodb://test:test@localhost:27017/test_ingestion?authSource=admin
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
          FERNET_KEY: ${{ secrets.FERNET_KEY_CI || 'dGVzdC1mZXJuZXQta2V5LWZpbGwtMzItYnl0ZXMhIQ==' }}
          FLASK_ENV: testing
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ --cov=app --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  # ── Frontend: tests ──────────────────────────────────────────────────────────
  test-frontend:
    name: Tests (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: cd frontend && npm ci

      - name: Run Vitest
        run: cd frontend && npm test -- --run --coverage

  # ── Docker build smoke test ──────────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy env file
        run: cp .env.example .env

      - name: Build all services
        uses: docker/bake-action@v5
        with:
          files: docker-compose.yml
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
